services:
  # Backend FastAPI
  - type: web
    name: citas-medicas-backend
    env: python
    region: ohio
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false # Debes llenar esto en el Dashboard de Render manualmente
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60

  # Frontend Next.js
  - type: web
    name: citas-medicas-frontend
    env: node
    region: ohio
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: citas-medicas-backend
          envVarKey: RENDER_EXTERNAL_URL
