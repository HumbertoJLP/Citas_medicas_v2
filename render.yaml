services:
  # Backend FastAPI
  - type: web
    name: citas-medicas-backend
    runtime: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        sync: false 
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60

  # Frontend Next.js
  - type: web
    name: citas-medicas-frontend
    runtime: node
    region: ohio
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    startCommand: "npm run start"
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: citas-medicas-backend
          envVarKey: RENDER_EXTERNAL_URL